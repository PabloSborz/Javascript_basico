<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Sistema de Cadastro de Alunos</h1>

    <form id="formCadastro">
        <input type="text" id="nomeAluno" placeholder="Digite o nome do aluno">
        <input type="number" id="idadeAluno" placeholder="Digite a idade do aluno">
        <input type="text" id="cursoAluno" placeholder="Digite o curso do aluno">
        <button type="button" id="botaoCadastrarAluno">Cadastrar</button>
    </form>

    <h2>Lista de Alunos</h2>
    <ul id="listaAlunos"></ul>

    <script src="desafio.js"></script>
</body>
</html>
